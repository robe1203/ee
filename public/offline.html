<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #081224;
      color: white;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      text-align: center;
      padding: 24px;
    }
    .box {
      max-width: 420px;
    }
    h1 {
      margin-bottom: 12px;
    }
    p {
      color: #cbd5e1;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Sin conexión a internet</h1>
    <p>La aplicación no pudo cargar datos nuevos, pero seguirá funcionando con la información disponible localmente.</p>
  </div>
</body>
</html>
